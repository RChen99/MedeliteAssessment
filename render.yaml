# Render Blueprint: https://render.com/docs/blueprint-spec
# Dashboard setup: New Web Service → connect GitHub → or use Blueprint from this file.
services:
  - type: web
    name: medelite-api
    runtime: python
    plan: free
    region: virginia
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
